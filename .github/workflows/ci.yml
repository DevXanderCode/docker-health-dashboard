name: CI

# Run on every pull request to main so problems are caught before
# they ever reach the main branch.
on:
  pull_request:
    branches: ["main"]

# Automatically cancel older builds on the same branch/PR
concurrency:
  group: ${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: true

jobs:
  # ---------------------------------------------------------------------------
  # Static analysis: lint the shell scripts without executing them.
  # ---------------------------------------------------------------------------
  shellcheck:
    name: 🧪 ShellCheck (lint)
    runs-on: ubuntu-latest
    steps:
      - name: Check out the code
        uses: actions/checkout@v4

      - name: Install ShellCheck
        run: sudo apt-get update && sudo apt-get install -y shellcheck

      # .shellcheckrc (shell=bash, disabled checks) is picked up automatically.
      - name: Lint dhealth and the test mocks
        run: shellcheck dhealth tests/mocks/* tests/helpers.bash

  # ---------------------------------------------------------------------------
  # Tests: run the bats unit + integration suite.
  # ---------------------------------------------------------------------------
  bats:
    name: Bats (tests)
    runs-on: ubuntu-latest
    steps:
      - name: Check out the code
        uses: actions/checkout@v4

      - name: Install Bats
        run: sudo apt-get update && sudo apt-get install -y bats

      - name: 🎬 Run the test suite
        run: bats tests/
